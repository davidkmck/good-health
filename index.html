<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Good Health</title>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --dim: #64748b;
            --diet-h: 25; --exer-h: 200;
            --active-h: var(--diet-h); --active-s: 10%; --active-l: 20%;
            --accent: hsl(var(--active-h), var(--active-s), var(--active-l));
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; transition: background 0.5s; overflow-x: hidden; }
        .tab-container { display: flex; background: var(--card); border-radius: 30px; padding: 5px; margin-bottom: 20px; width: 100%; max-width: 340px; box-sizing: border-box; }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; color: var(--dim); }
        .tab.active { background: var(--accent); color: white; }
        h1 { color: var(--accent); font-weight: 300; letter-spacing: 2px; text-transform: uppercase; margin: 10px 0; transition: color 0.5s; }
        .entry-box { background: var(--card); padding: 30px; border-radius: 24px; text-align: center; width: 100%; max-width: 340px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box; }
        .score-display { font-size: 4rem; font-weight: bold; color: var(--accent); transition: color 0.5s; }
        #status { color: var(--dim); font-size: 0.9rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; height: 20px; margin-top: -5px; }
        .slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #334155; outline: none; margin: 25px 0; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 32px; height: 32px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 4px solid var(--bg); transition: background 0.5s; }
        
        /* Calendar Styles */
        .calendar-container { width: 100%; max-width: 340px; margin-top: 30px; background: var(--card); padding: 15px; border-radius: 20px; box-sizing: border-box; touch-action: pan-y; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px; }
        #monthLabel { font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: var(--text); }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-label { font-size: 0.7rem; color: var(--dim); text-align: center; margin-bottom: 5px; }
        .day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.8rem; border-radius: 8px; background: rgba(255,255,255,0.03); position: relative; }
        .day.today { border: 1px solid var(--accent); }
        .day-num { font-size: 0.6rem; color: var(--dim); position: absolute; top: 4px; left: 4px; }
        .score-val { font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="tab-container">
        <div id="tabDiet" class="tab active" onclick="setMode('diet')">Diet</div>
        <div id="tabExer" class="tab" onclick="setMode('exercise')">Exercise</div>
    </div>

    <h1 id="modeTitle">DIET</h1>

    <div class="entry-box">
        <div id="scoreDisplay" class="score-display">5</div>
        <div id="status">AVERAGE</div>
        <input type="range" min="0" max="10" value="5" class="slider" id="scoreSlider">
    </div>

    <div class="calendar-container" id="swipeArea">
        <div class="calendar-header">
            <span id="monthLabel">Month Year</span>
        </div>
        <div class="grid" id="calendarGrid">
            </div>
    </div>

    <script>
        const getDateKey = (date = new Date()) => date.toLocaleDateString('en-CA');
        const slider = document.getElementById('scoreSlider');
        const display = document.getElementById('scoreDisplay');
        const status = document.getElementById('status');
        const modeTitle = document.getElementById('modeTitle');
        const monthLabel = document.getElementById('monthLabel');
        
        let mode = 'diet';
        let healthData = JSON.parse(localStorage.getItem('healthData')) || { diet: {}, exercise: {} };
        let currentViewDate = new Date(); // Controls which month we see
        const todayKey = getDateKey();

        const labelMap = {
            0: "Poor", 1: "Poor", 2: "Struggling", 3: "Struggling",
            4: "Average", 5: "Average", 6: "Good", 7: "Good",
            8: "Great", 9: "Great", 10: "Excellent"
        };

        function setMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(mode === 'diet' ? 'tabDiet' : 'tabExer').classList.add('active');
            modeTitle.innerText = mode.toUpperCase();
            
            const currentVal = healthData[mode][todayKey] !== undefined ? healthData[mode][todayKey] : 5;
            slider.value = currentVal;
            display.innerText = currentVal;
            updateUI(currentVal);
            renderCalendar();
        }

        function updateUI(val) {
            val = parseInt(val);
            status.innerText = labelMap[val].toUpperCase();
            const hue = mode === 'diet' ? 25 : 200;
            const bgS = 5 + (val * 4); 
            const bgL = 2 + (val * 1.2); 
            document.body.style.backgroundColor = `hsl(${hue}, ${bgS}%, ${bgL}%)`;
            const accS = 10 + (val * 8); 
            const accL = 20 + (val * 3); 
            document.documentElement.style.setProperty('--active-h', hue);
            document.documentElement.style.setProperty('--active-s', `${accS}%`);
            document.documentElement.style.setProperty('--active-l', `${accL}%`);
        }

        slider.addEventListener('input', () => {
            const val = slider.value;
            display.innerText = val;
            updateUI(val);
            healthData[mode][todayKey] = parseInt(val);
            localStorage.setItem('healthData', JSON.stringify(healthData));
            renderCalendar();
        });

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            ['S','M','T','W','T','F','S'].forEach(day => {
                const div = document.createElement('div');
                div.className = 'day-label';
                div.innerText = day;
                grid.appendChild(div);
            });

            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            
            // Set Month Name
            const monthName = currentViewDate.toLocaleString('default', { month: 'long', year: 'numeric' });
            monthLabel.innerText = monthName;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

            for (let d = 1; d <= daysInMonth; d++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day';
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const score = healthData[mode][dateStr];
                const hue = mode === 'diet' ? 25 : 200;

                if (dateStr === todayKey) dayDiv.classList.add('today');
                if (score !== undefined) {
                    dayDiv.style.background = `hsla(${hue}, ${10 + (score * 8)}%, ${20 + (score * 2)}%, ${score / 15 + 0.15})`;
                    dayDiv.innerHTML = `<span class="day-num">${d}</span><span class="score-val">${score}</span>`;
                } else {
                    dayDiv.innerHTML = `<span class="day-num">${d}</span>`;
                }
                grid.appendChild(dayDiv);
            }
        }

        // Swipe Logic
        let touchstartX = 0;
        let touchendX = 0;
        const swipeArea = document.getElementById('swipeArea');

        swipeArea.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; });
        swipeArea.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            const threshold = 50;
            if (touchendX < touchstartX - threshold) {
                // Swiped Left -> Move to Next Month
                currentViewDate.setMonth(currentViewDate.getMonth() + 1);
                renderCalendar();
            }
            if (touchendX > touchstartX + threshold) {
                // Swiped Right -> Move to Previous Month
                currentViewDate.setMonth(currentViewDate.getMonth() - 1);
                renderCalendar();
            }
        }

        setMode('diet');
    </script>
</body>
</html>
